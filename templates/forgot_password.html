{% extends "base.html" %}

{% block title %}Forgot Password - Dunedeck Millers{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="mb-3">
                        <i class="bi bi-key" style="font-size: 3rem; color: var(--dm-red);"></i>
                    </div>
                    <h2 class="fw-bold">Forgot Password?</h2>
                    <p class="text-muted">Request password reset from administrator</p>
                </div>
                
                <form method="POST" action="{{ url_for('forgot_password') }}">
                    <div class="mb-4">
                        <label for="username" class="form-label fw-semibold">Your Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control form-control-lg" id="username" 
                                   name="username" required autofocus placeholder="Enter your username">
                        </div>
                    </div>
                    
                    <div class="alert alert-info">
                        <i class="bi bi-info-circle"></i>
                        Your request will be sent to the administrator. They will contact you with a new password.
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">
                        <i class="bi bi-send"></i> Submit Request
                    </button>
                    
                    <div class="text-center">
                        <a href="{{ url_for('login') }}" class="text-muted">
                            <i class="bi bi-arrow-left"></i> Back to Login
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
