{% extends "base.html" %}

{% block title %}Login - Dunedeck Millers{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="mb-3">
                        <i class="bi bi-box-seam text-primary" style="font-size: 3rem;"></i>
                    </div>
                    <h2 class="fw-bold">Dunedeck Millers</h2>
                    <p class="text-muted">Daily Weight Record System</p>
                </div>
                
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">Username</label>
                        <input type="text" class="form-control form-control-lg" id="username" 
                               name="username" required autofocus>
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">Password</label>
                        <input type="password" class="form-control form-control-lg" id="password" 
                               name="password" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-lg w-100">
                        <i class="bi bi-box-arrow-in-right"></i> Sign In
                    </button>
                </form>
                
                <div class="mt-4 p-3 bg-light rounded">
                    <p class="mb-2 fw-semibold small">Demo Credentials:</p>
                    <p class="mb-1 small">Worker: worker1 / worker123</p>
                    <p class="mb-0 small">Manager: manager / manager123</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
